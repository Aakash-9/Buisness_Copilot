  return_rate:
    description: '% of delivered order items that were returned. Returns join via
      order_item_id (NOT order_id).'
    tables:
    - order_items
    - returns
    formula_logic:
      join: r.order_item_id = oi.order_item_id LEFT JOIN orders o ON o.order_id =
        oi.order_id
      filter: o.order_status = 'Delivered'
      aggregation: ROUND(COUNT(DISTINCT r.return_id) * 100.0 / NULLIF(COUNT(DISTINCT
        oi.order_item_id), 0), 2)
    type: operational
    aliases:
    - return rate
    - returns percentage
    - '% returned'
    - return ratio
  total_returns:
    description: 'Count of returns. return_type can be Return or Exchange. return_status:
      Completed, Picked Up, Rejected, Initiated, Received.'
    tables:
    - returns
    formula_logic:
      filter: r.return_type = 'Return'
      aggregation: COUNT(DISTINCT r.return_id)
    type: operational
    aliases:
    - returns
    - total returns
    - number of returns
    - how many returns
    - return count
    - no of returns
    - items came back
    - came back
    - sent back
    - products sent back
    - items sent back
    - returned items
    - items returned
    - goods returned
    - customer returns
    - return volume
    - how many returned
    - kitne returns
    - kitne returns aaye
    - return mila kitna
    - wapas aaye kitne
  delivery_performance:
    description: On-time delivery rate. Compare actual_delivery_date vs promised_delivery_date
      in shipments.
    tables:
    - shipments
    formula_logic:
      filter: sh.delivery_status = 'Delivered'
      aggregation: ROUND(COUNT(CASE WHEN sh.actual_delivery_date <= sh.promised_delivery_date
        THEN 1 END) * 100.0 / NULLIF(COUNT(sh.shipment_id), 0), 2)
    type: operational
    aliases:
    - delivery performance
    - on time delivery
    - delivery rate
    - late deliveries
    - courier performance
    - delayed deliveries
    - delivery success rate
    - delivery success
    - on-time delivery
    - delivery delays
    - delivery issues
    - shipmnt delays
    - shipment delays
  inventory_health:
    description: 'Available vs damaged stock. Columns: available_qty, reserved_qty,
      damaged_qty in inventory.'
    tables:
    - inventory
    formula_logic:
      filter: 1=1
      aggregation: SUM(inv.available_qty), SUM(inv.reserved_qty), SUM(inv.damaged_qty)
    type: operational
    aliases:
    - inventory
    - stock
    - available stock
    - damaged stock
    - inventory health
    - stock levels
  payment_failures:
    description: Count of failed payments. payment_status = 'Failed' in payments table.
