    formula_logic:
      filter: 1=1
      aggregation: COUNT(DISTINCT o.order_id)
    type: operational
    aliases:
    - orders
    - order count
    - number of orders
    - total orders
    - how many orders
    - order volume
    - orders placed
    - orders received
    - kitne orders
    - order traffic
    - orders came in
    - orders this month
  cancelled_orders:
    description: Count of cancelled orders. order_status = 'Cancelled'
    tables:
    - orders
    formula_logic:
      filter: o.order_status = 'Cancelled'
      aggregation: COUNT(DISTINCT o.order_id)
    type: operational
    aliases:
    - cancellations
    - cancelled orders
    - order cancellations
    - how many cancelled
    - cancel count
    - dropped orders
