    formula_logic:
      join: oi.order_id = o.order_id INNER JOIN products p ON p.product_id = oi.product_id
      filter: o.order_status = 'Delivered'
      aggregation: SUM(COALESCE(oi.item_price, 0))
    type: financial
    aliases:
    - by season
    - season wise
    - products by season
    - seasonal sales
    - season breakdown
    - show products by season
