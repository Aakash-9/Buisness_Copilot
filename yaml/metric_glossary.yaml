metrics:
  gmv:
    description: Gross Merchandise Value — total item_price from Delivered + Shipped
      orders
    tables:
    - orders
    - order_items
    formula_logic:
      join: oi.order_id = o.order_id
      filter: o.order_status IN ('Delivered', 'Shipped')
      aggregation: SUM(COALESCE(oi.item_price, 0))
    type: financial
    aliases:
    - gross merchandise value
    - total gmv
    - gmv
    - gross sales
    - total gross sales
    - total value of orders
    - merchandise value
    - how much we grossed
  realized_revenue:
    description: Revenue from Delivered orders only — use o.final_payable for order-level,
      oi.item_price for item-level
    tables:
    - orders
    - order_items
    formula_logic:
      join: oi.order_id = o.order_id
      filter: o.order_status = 'Delivered'
      aggregation: SUM(COALESCE(oi.item_price, 0))
    order_level_aggregation: SUM(COALESCE(o.final_payable, 0))
    type: financial
    aliases:
    - revenue
    - realized revenue
    - actual revenue
    - income
    - sales
    - total sales
    - what is the sales
    - earnings
    - earned
    - earn
    - collected
    - money collected
    - money came in
    - we made
    - what we made
    - sales figures
    - top sellers
    - sellers by revenue
    - sellers by sales
    - best sellers
    - seller revenue
    - total income
    - turnover
    - how much we made
    - money earned
    - how much earned
    - sales numbers
    - revenue numbers
    - top line
    - gross revenue
    - kitna mila
    - kitna hua
    - mila kitna
    - sales kitni
  net_revenue:
    description: Revenue after subtracting completed refunds. refunds.refunded_amount
      is the correct column.
    tables:
    - orders
    - order_items
    - returns
    - refunds
    formula_logic:
      join: oi.order_id = o.order_id LEFT JOIN returns r ON r.order_item_id = oi.order_item_id
        LEFT JOIN refunds rf ON rf.return_id = r.return_id
      filter: o.order_status = 'Delivered'
      aggregation: SUM(COALESCE(oi.item_price, 0)) - COALESCE(SUM(CASE WHEN rf.refund_status
        = 'Completed' THEN rf.refunded_amount ELSE 0 END), 0)
    type: financial
    aliases:
    - net revenue
    - revenue after refunds
    - actual income
    - net sales
  discount_impact:
    description: Total discount given on orders — use o.discount_amount
    tables:
    - orders
    formula_logic:
      filter: o.order_status IN ('Delivered', 'Shipped')
      aggregation: SUM(COALESCE(o.discount_amount, 0))
    type: financial
    aliases:
    - discount
    - discounts given
    - total discount
    - discount amount
    - promo impact
  avg_order_value:
    description: Average final_payable per delivered order
    tables:
    - orders
    formula_logic:
      filter: o.order_status = 'Delivered'
      aggregation: ROUND(SUM(COALESCE(o.final_payable, 0)) / NULLIF(COUNT(DISTINCT
        o.order_id), 0), 2)
    type: financial
    aliases:
    - aov
    - average order value
    - avg order
    - order average
    - average basket size
    - average order
    - mean order value
    - typical order value
    - order value average
  refund_amount:
    description: Total refunded to customers. Column is refunded_amount (NOT refund_amount).
      Only Completed refunds.
    tables:
    - returns
    - refunds
    formula_logic:
      join: rf.return_id = r.return_id
      filter: rf.refund_status = 'Completed'
      aggregation: SUM(COALESCE(rf.refunded_amount, 0))
    type: financial
    aliases:
    - refunds
    - total refunds
    - refunded amount
    - money refunded
    - refund total
    - how much refunded
    - money given back
    - amount refunded
    - refund amount
    - total refund amount
    - refund value
    - refund money
  seller_settlement:
    description: 'Total net_payable to sellers. Status values: Paid, Processed, Pending,
      On Hold. Column is net_payable.'
    tables:
    - seller_settlements
    - order_items
    formula_logic:
      join: ss.order_item_id = oi.order_item_id
      filter: ss.settlement_status IN ('Paid', 'Processed')
      aggregation: SUM(COALESCE(ss.net_payable, 0))
    type: financial
    aliases:
    - settlement
    - seller payout
    - seller payment
    - amount settled
    - seller settlement
  commission_earned:
    description: Platform commission earned from sellers. Column is commission_amount
      in seller_settlements.
    tables:
    - seller_settlements
    formula_logic:
      filter: ss.settlement_status IN ('Paid', 'Processed')
      aggregation: SUM(COALESCE(ss.commission_amount, 0))
    type: financial
    aliases:
    - commission
    - platform commission
    - commission earned
    - commission amount
  loss:
    description: Business loss from Cancelled and Returned order items. Uses oi.item_price.
    tables:
    - orders
    - order_items
    formula_logic:
      join: oi.order_id = o.order_id
      filter: o.order_status IN ('Cancelled', 'Returned')
      aggregation: SUM(COALESCE(oi.item_price, 0))
    type: financial
    aliases:
