    - losing money
    - negative revenue
    - why loss
    - faced loss
    - facing loss
    - bleeding money
    - money lost
    - we lost
    - how much lost
    - loss hua
    - loss ho raha
    - numbers down
    - why down
    - financial loss
    - losing
    - loss this month
    - show loss
    - total loss
  total_orders:
