default_time_column: "o.order_date"

time_filters:

  today:
    keywords: ["today", "current day"]
    sql: "o.order_date = current_date"

  yesterday:
    keywords: ["yesterday"]
    sql: "o.order_date = current_date - interval '1 day'"

  this_week:
    keywords: ["this week", "current week"]
    sql: "o.order_date >= date_trunc('week', current_date)"

  last_7_days:
    keywords: ["last 7 days", "past 7 days", "past week"]
    sql: "o.order_date >= current_date - interval '7 days'"

  last_month:
    keywords: ["last month", "previous month", "past month"]
    sql: "o.order_date >= date_trunc('month', current_date - interval '1 month') AND o.order_date < date_trunc('month', current_date)"

  this_month:
    keywords: ["this month", "current month", "monthly"]
    sql: "o.order_date >= date_trunc('month', current_date)"

  last_30_days:
    keywords: ["last 30 days", "past 30 days", "rolling 30 days"]
    sql: "o.order_date >= current_date - interval '30 days'"

  last_90_days:
    keywords: ["last 90 days", "past 90 days"]
    sql: "o.order_date >= current_date - interval '90 days'"

  last_quarter:
    keywords: ["last quarter", "previous quarter", "past quarter"]
    sql: "o.order_date >= date_trunc('quarter', current_date - interval '3 months') AND o.order_date < date_trunc('quarter', current_date)"

  this_quarter:
    keywords: ["this quarter", "current quarter", "q1", "q2", "q3", "q4"]
    sql: "o.order_date >= date_trunc('quarter', current_date)"

  this_year:
    keywords: ["this year", "current year", "ytd", "year to date"]
    sql: "o.order_date >= date_trunc('year', current_date)"

  last_year:
    keywords: ["last year", "previous year"]
    sql: "o.order_date >= date_trunc('year', current_date - interval '1 year') AND o.order_date < date_trunc('year', current_date)"

default_fallback:
  description: "If no time keyword found, default to this month"
  sql: "o.order_date >= date_trunc('month', current_date)"

alternate_time_columns:
  shipments: "sh.shipped_date"
  refunds: "rf.refund_date"
  returns: "r.return_date"
  payments: "pay.payment_date"
  seller_settlements: "ss.settlement_date"
  inventory_movements: "im.movement_date"

rules:
  - "Always apply a time filter unless user explicitly asks for all-time data"
  - "Default time column is o.order_date from orders table"
  - "For shipment queries use sh.shipped_date"
  - "For refund queries use rf.refund_date"
  - "For return queries use r.return_date"
  - "For settlement queries use ss.settlement_date"
  - "Never hardcode dates — always use current_date relative expressions"
