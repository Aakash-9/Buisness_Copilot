# ─────────────────────────────────────────────────────────────
# JOIN PATH SPECIFICATION — aligned with real database schema
# ─────────────────────────────────────────────────────────────
# Real schema confirmed columns:
#   orders:             order_id, customer_id, order_date, order_status,
#                       payment_mode, total_amount, discount_amount, final_payable, order_channel
#   order_items:        order_item_id, order_id, product_id, seller_id, quantity, item_price, item_status
#   customers:          customer_id, signup_date, city, state, gender, age_group, loyalty_tier
#   products:           product_id, seller_id, brand, category, sub_category, size, color,
#                       mrp, selling_price, season, is_returnable
#   sellers:            seller_id, seller_name, seller_type, onboarding_date, seller_rating,
#                       seller_region, commission_rate, risk_flag, is_active
#   payments:           payment_id, order_id, payment_method, payment_status, payment_date,
#                       paid_amount, gateway
#   shipments:          shipment_id, order_id, warehouse_id, courier_partner, shipped_date,
#                       promised_delivery_date, actual_delivery_date, delivery_status
#   warehouses:         warehouse_id (+ other cols)
#   returns:            return_id, order_item_id, return_date, return_reason, return_type,
#                       return_status, pickup_date, refund_amount
#   refunds:            refund_id, return_id, refund_method, refund_status, refund_date,
#                       refunded_amount   ← correct column name
#   seller_settlements: settlement_id, seller_id, order_item_id, gross_amount,
#                       commission_amount, net_payable, settlement_date, settlement_status
#   inventory:          inventory_id, product_id, seller_id, warehouse_id,
#                       available_qty, reserved_qty, damaged_qty, last_updated
#   inventory_movements: movement_id, inventory_id, movement_type, quantity,
#                        reference_id, movement_date
# ─────────────────────────────────────────────────────────────

core_paths:

  customer_to_order:
    from: customers
    to: orders
    alias: { customers: c, orders: o }
    condition: "o.customer_id = c.customer_id"
    join_type: INNER

  order_to_order_items:
    from: orders
    to: order_items
    alias: { orders: o, order_items: oi }
    condition: "oi.order_id = o.order_id"
    join_type: INNER

  order_items_to_products:
    from: order_items
    to: products
    alias: { order_items: oi, products: p }
    condition: "oi.product_id = p.product_id"
    join_type: LEFT

  order_items_to_sellers:
    from: order_items
    to: sellers
    alias: { order_items: oi, sellers: s }
    condition: "oi.seller_id = s.seller_id"
    join_type: LEFT

  order_to_payments:
    from: orders
    to: payments
    alias: { orders: o, payments: pay }
    condition: "pay.order_id = o.order_id"
    join_type: LEFT

  order_to_shipments:
    from: orders
    to: shipments
    alias: { orders: o, shipments: sh }
    condition: "sh.order_id = o.order_id"
    join_type: LEFT

  shipments_to_warehouses:
    from: shipments
    to: warehouses
    alias: { shipments: sh, warehouses: w }
    condition: "sh.warehouse_id = w.warehouse_id"
    join_type: LEFT

  # ⚠️ CRITICAL: returns joins via order_item_id, NOT order_id
  order_items_to_returns:
    from: order_items
    to: returns
    alias: { order_items: oi, returns: r }
    condition: "r.order_item_id = oi.order_item_id"
    join_type: LEFT
    note: "returns has NO order_id column — always join via order_item_id"

  returns_to_refunds:
    from: returns
    to: refunds
    alias: { returns: r, refunds: rf }
    condition: "rf.return_id = r.return_id"
    join_type: LEFT
    note: "refund amount column is refunded_amount (NOT refund_amount)"

  order_items_to_settlements:
    from: order_items
    to: seller_settlements
    alias: { order_items: oi, seller_settlements: ss }
    condition: "ss.order_item_id = oi.order_item_id"
    join_type: LEFT
    note: "settlement amount column is net_payable. Status values: Paid, Processed, Pending, On Hold"

  inventory_to_products:
    from: inventory
    to: products
    alias: { inventory: inv, products: p }
    condition: "inv.product_id = p.product_id"
    join_type: LEFT

  inventory_to_sellers:
    from: inventory
    to: sellers
    alias: { inventory: inv, sellers: s }
    condition: "inv.seller_id = s.seller_id"
    join_type: LEFT

  inventory_to_warehouses:
    from: inventory
    to: warehouses
    alias: { inventory: inv, warehouses: w }
    condition: "inv.warehouse_id = w.warehouse_id"
    join_type: LEFT

  inventory_to_movements:
    from: inventory
    to: inventory_movements
    alias: { inventory: inv, inventory_movements: im }
    condition: "im.inventory_id = inv.inventory_id"
    join_type: LEFT

enforcement_rules:

  - rule: "sellers must always be reached via order_items.seller_id, never directly from orders"
    pattern: "sellers"
    requires: "order_items"
    error: "Direct join to sellers from orders is forbidden. Use order_items as bridge."

  - rule: "refunds must always be reached via returns"
    pattern: "refunds"
    requires: "returns"
    error: "Direct join to refunds without returns is forbidden. Path: order_items → returns → refunds"

  - rule: "warehouses must always be reached via shipments (for order context) or inventory (for stock context)"
    pattern: "warehouses"
    requires_one_of: ["shipments", "inventory"]
    error: "warehouses must be reached via shipments or inventory, never directly."

  - rule: "seller_settlements must go through order_items"
    pattern: "seller_settlements"
    requires: "order_items"
    error: "seller_settlements must always join via order_items.order_item_id"

  - rule: "inventory_movements must go through inventory"
    pattern: "inventory_movements"
    requires: "inventory"
    error: "inventory_movements must join via inventory.inventory_id"

  - rule: "returns does NOT have order_id — never join returns directly to orders"
    pattern: "returns"
    forbidden_join: "returns.order_id"
    error: "returns table has NO order_id. Always join returns via order_items.order_item_id"

column_corrections:
  - wrong: "refunds.refund_amount"
    correct: "refunds.refunded_amount"
  - wrong: "seller_settlements.settlement_amount"
    correct: "seller_settlements.net_payable"
  - wrong: "seller_settlements.settlement_status = 'Settled'"
    correct: "seller_settlements.settlement_status IN ('Paid', 'Processed')"
  - wrong: "refunds.refund_status = 'Processed'"
    correct: "refunds.refund_status = 'Completed'"

table_aliases:
  orders: o
  order_items: oi
  products: p
  sellers: s
  customers: c
  payments: pay
  shipments: sh
  warehouses: w
  returns: r
  refunds: rf
  seller_settlements: ss
  inventory: inv
  inventory_movements: im
